services:
  - type: web
    name: hr-mcp-openai
    runtime: python
    plan: free             # bump to "starter" ($7/mo) for always-on, no cold-start sleep
    region: singapore      # closest to the AWS RDS instance in ap-south-1
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py
    healthCheckPath: /health

    envVars:
      # Secrets — set the VALUES manually in the Render dashboard (sync: false).
      - key: OPENAI_API_KEY
        sync: false
      - key: DB_HOST
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false

      # Non-secret defaults (safe to commit)
      - key: DB_NAME
        value: hr_db
      - key: DB_PORT
        value: "3306"
      - key: OPENAI_MODEL
        value: gpt-4o
